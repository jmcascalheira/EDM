name: Build Windows EXE

# Builds Windows/dist/edm.exe on a real Windows runner (PyInstaller cannot
# cross-compile, so this is how the exe picks up source changes without a
# local Windows machine). Trigger manually from the Actions tab.

on:
  workflow_dispatch:
    inputs:
      commit_exe:
        description: "Commit the rebuilt edm.exe back into Windows/dist/"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "kivy[base]==2.1.0"
          pip install -r requirements.txt
          pip install pyinstaller==4.10

      - name: Build edm.exe
        working-directory: Windows
        # Kivy has no GPU on the CI runner. Force the mock GL backend so the
        # PyInstaller analysis can import kivy.core.* (esp. window) without
        # trying to create a real OpenGL context (which hangs the build). This
        # only affects build-time module discovery; the produced exe selects a
        # real GL backend at runtime on the user's machine.
        env:
          KIVY_GL_BACKEND: mock
          KIVY_NO_ARGS: '1'
          KIVY_NO_CONSOLELOG: '1'
        run: |
          python -m PyInstaller --clean --noconfirm edmpy.spec
          Move-Item -Force dist\edmpy.exe dist\edm.exe

      - name: Upload exe as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: edm-exe
          path: Windows/dist/edm.exe
          if-no-files-found: error

      - name: Commit exe back into the repo
        if: ${{ inputs.commit_exe }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Windows/dist/edm.exe
          git commit -m "Build Windows edm.exe (CI) [skip ci]" || echo "exe unchanged - nothing to commit"
          git push
